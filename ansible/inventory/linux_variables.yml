---
brewfile_location: ~/dotfiles/brew/Brewfile.linux
zdotdir: ~/dotfiles/zsh
ssh_origins:
  - {name: Github, hostname: github.com, user: git, host: github.com, identityfile: ~/.ssh/github/github,
    location: ~/.ssh/github}
  - {name: DevOps, hostname: dev.azure.com, user: git, host: dev.azure.com, identityfile: ~/.ssh/devops/devops,
    location: ~/.ssh/devops}
  - {name: SSHDevOps, hostname: ssh.dev.azure.com, user: git, host: ssh.dev.azure.com,
    identityfile: ~/.ssh/sshdevops/sshdevops, location: ~/.ssh/sshdevops}
  - {name: GithubSensey, hostname: github.com, user: git, host: github.com, identityfile: ~/.ssh/github-sensey/github-sensey,
    location: ~/.ssh/github-sensey}
stow_directories: [git, config, asdf]
