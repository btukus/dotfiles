- name: Ensure ~/.config/git directory exists
  file:
    path: ~/.config/git
    state: directory

- name: Generate git identity routing (insteadOf rewrites) from ssh_origins
  copy:
    dest: ~/.config/git/identity-routing
    content: |
      # Generated by ansible (zsh role) from ssh_origins[].orgs — do NOT edit by hand.
      # Add an org to an origin's `orgs:` list in inventory/*_variables.yml and re-run ansible.
      {% for origin in ssh_origins %}{% for org in origin.orgs | default([]) %}
      [url "git@{{ origin.name }}:{{ org }}/"]
          insteadOf = git@{{ origin.hostname }}:{{ org }}/
      {% endfor %}{% endfor %}
