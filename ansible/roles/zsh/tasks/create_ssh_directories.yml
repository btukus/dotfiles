- name: Create the SSH directories
  file:
    path: "{{ item.location }}"
    state: directory
  loop: "{{ ssh_origins }}"

- name: Ensure the SSH config directory exists
  file:
    path: "~/.ssh"
    state: directory

- name: Create the SSH config file
  copy:
    dest: "~/.ssh/config"
    content: |
      {% for origin in ssh_origins %}
      Host {{ origin.name }}{% if origin.primary | default(false) %} {{ origin.hostname }}{% endif %}

        HostName {{ origin.hostname }}
        User {{ origin.user }}
        IdentityFile {{ origin.identityfile }}
        IdentitiesOnly yes
      {% endfor %}
